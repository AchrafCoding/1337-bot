<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1337 Monitor</title>
<style>
  body { background: #000; color: #00ff00; font-family: monospace; text-align: center; padding: 20px; }
  #status { font-size: 2em; margin: 20px; }
  #count { font-size: 1em; opacity: 0.7; }
  .found { color: red; font-size: 3em; animation: blink 0.3s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
</style>
</head>
<body>
<h1>1337 MONITOR</h1>
<div id="status">Starting...</div>
<div id="count">Checks: 0</div>
<div id="time"></div>

<script>
const MARKER = "Any available Check-ins will appear here";
const URL = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://admission.1337.ma/candidature/check-in");
let count = 0;

function alarm() {
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.value = 1;
    osc.start();
    setTimeout(() => osc.stop(), 2000);
  } catch(e) {}
}

async function check() {
  try {
    const r = await fetch(URL + "&t=" + Date.now());
    const html = await r.text();
    count++;
    document.getElementById("count").textContent = "Checks: " + count;
    document.getElementById("time").textContent = new Date().toLocaleTimeString();

    if (!html.includes(MARKER)) {
      document.getElementById("status").innerHTML = '<div class="found">🚨 SLOT OPEN! GO NOW!</div>';
      document.title = "🚨 SLOT OPEN!";
      alarm();
      // Keep alarming every 2 seconds
      setInterval(alarm, 2000);
    } else {
      document.getElementById("status").textContent = "✅ Watching... no slot yet";
    }
  } catch(e) {
    document.getElementById("status").textContent = "⚠️ Error - retrying...";
  }
}

// Check every 2 seconds
check();
setInterval(check, 2000);
</script>
</body>
</html>
